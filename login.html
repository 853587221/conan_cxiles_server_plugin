<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RCON客户端</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>🖥️ RCON客户端</h1>
            <p>流放者柯南纯净服专用</p>
        </div>
        
        <div id="loginMessage" class="login-message"></div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="username">用户名:</label>
                <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码:</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group" id="captchaGroup" style="display: none;">
                <label for="captcha">验证码:</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="captcha" class="form-control" placeholder="请输入验证码" style="flex: 1;">
                    <button type="button" id="refreshCaptchaBtn" class="btn" style="padding: 8px 15px; font-size: 14px;">🔄 刷新</button>
                </div>
                <div id="captchaDisplay" style="margin-top: 10px; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 5px; text-align: center; font-size: 24px; letter-spacing: 5px; font-weight: bold; color: #9c27b0; display: none;"></div>
            </div>
            
            <button type="submit" class="btn btn-login">🔐 登录</button>
        </form>
        
        <div class="login-footer">
            <p><a href="javascript:void(0)" onclick="window.location.href='register.html'" class="register-link">注册新账号</a></p>
            <p><a href="#" id="changePasswordLink" class="register-link">修改密码</a></p>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div id="changePasswordModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>🔑 修改密码</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="cp-username">用户名:</label>
                    <input type="text" id="cp-username" class="form-control" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="cp-old-password">旧密码:</label>
                    <input type="password" id="cp-old-password" class="form-control" placeholder="请输入旧密码" required>
                </div>
                
                <div class="form-group">
                    <label for="cp-new-password">新密码:</label>
                    <input type="password" id="cp-new-password" class="form-control" placeholder="请输入新密码" required>
                </div>
                
                <div class="form-group">
                    <label for="cp-confirm-password">确认新密码:</label>
                    <input type="password" id="cp-confirm-password" class="form-control" placeholder="请再次输入新密码" required>
                </div>
                
                <div class="modal-actions">
                    <button type="button" id="changePasswordBtn" class="btn btn-login">🔑 修改密码</button>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>
</html>
