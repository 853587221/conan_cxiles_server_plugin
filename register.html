<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - RCON客户端</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>🖥️ RCON客户端</h1>
            <p>流放者柯南纯净服专用</p>
        </div>
        
        <div id="registerMessage" class="login-message"></div>
        
        <form class="login-form" id="registerForm">
            <div class="form-group">
                <label for="reg-username">用户名:</label>
                <input type="text" id="reg-username" class="form-control" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label for="reg-password">密码:</label>
                <input type="password" id="reg-password" class="form-control" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group">
                <label for="reg-confirm-password">确认密码:</label>
                <input type="password" id="reg-confirm-password" class="form-control" placeholder="请再次输入密码" required>
            </div>
            
            <div class="form-group">
                <label for="reg-invite-code">邀请码:</label>
                <input type="text" id="reg-invite-code" class="form-control" placeholder="请输入邀请码" required>
            </div>
            
            <button type="submit" class="btn btn-login">📝 注册</button>
        </form>
        
        <div class="login-footer">
            <p><a href="javascript:void(0)" onclick="window.location.href='login.html'" class="register-link">返回登录</a></p>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
</body>
</html>
